services:
  postgres:
    image: postgres:16
    container_name: onlyaleo-postgres
    environment:
      POSTGRES_USER: onlyaleo
      POSTGRES_PASSWORD: onlyaleo
      POSTGRES_DB: onlyaleo
    ports:
      - "5432:5432"
    volumes:
      - onlyaleo_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: onlyaleo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - onlyaleo_minio:/data

volumes:
  onlyaleo_pg:
  onlyaleo_minio:

